<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>德文跟讀練習 - Shadowing Trainer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#f0f4f8;color:#222}
header{background:#1565c0;color:#fff;padding:14px 18px;position:sticky;top:0;z-index:100}
header h1{font-size:18px}
header p{font-size:12px;margin-top:4px;opacity:.85}
.wrap{display:flex;flex-direction:row;height:calc(100vh - 60px)}
@media(max-width:800px){.wrap{flex-direction:column;height:auto}}
.left{width:40%;border-right:1px solid #ccc;overflow-y:auto;padding:12px;background:#fff}
.right{width:60%;overflow-y:auto;padding:12px;background:#fafafa}
@media(max-width:800px){.left,.right{width:100%}}
h2{font-size:14px;margin-bottom:8px;color:#1565c0}
.url-box{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.url-box input{flex:1;min-width:160px;padding:8px;border:1px solid #ccc;border-radius:6px;font-size:13px}
.url-box button{padding:8px 14px;border:none;border-radius:6px;cursor:pointer;background:#1565c0;color:#fff;font-size:12px}
.url-note{font-size:11px;color:#888;margin-top:6px}
.card{border:1px solid #e0e0e0;border-radius:6px;padding:10px;margin-bottom:8px;background:#fff;transition:background .2s}
.card.done{background:#e8f5e9;border-color:#a5d6a7}
.card.done .de{text-decoration:line-through;color:#999}
.ts{font-size:11px;color:#1565c0;cursor:pointer;text-decoration:underline;margin-bottom:4px;display:inline-block}
.de{font-size:14px;margin:4px 0;line-height:1.5}
.zh{font-size:12px;color:#555;margin:4px 0;padding-left:12px;border-left:2px solid #ccc;font-style:italic}
.btns{margin-top:6px}
button.btns-btn{font-size:11px;padding:4px 10px;border:none;border-radius:4px;cursor:pointer}
.b-done{background:#43a047;color:#fff}
.b-undo{background:#ef6c00;color:#fff}
.progress{font-size:12px;color:#555;margin-bottom:8px;padding:8px;background:#e3f2fd;border-radius:6px}
</style>
</head>
<body>
<header>
  <h1>德文跟讀練習 - Shadowing Trainer</h1>
  <p>貼入任何 YouTube 德文影片連結，自動整理逐句跟讀，右側附中文翻譯。</p>
</header>
<div class="wrap">
  <div class="left">
    <h2>步驟 1：貼入 YouTube 連結</h2>
    <div class="url-box">
      <input type="text" id="ytInput" placeholder="例如：https://youtu.be/5xMl8W-aiCg 或 https://www.youtube.com/watch?v=...">
      <button onclick="loadVideo()">載入影片</button>
    </div>
    <div class="url-note">支援格式：<code>youtu.be/XXX</code> 或 <code>youtube.com/watch?v=XXX</code></div>
    <h2 style="margin-top:16px;">影片</h2>
    <iframe id="yt" width="100%" height="220" src="https://www.youtube.com/embed/5xMl8W-aiCg" frameborder="0" allowfullscreen></iframe>
    <p style="font-size:11px;color:#888;margin-top:8px;">點右側「跳到此句」即可跳到影片對應時間點。</p>
  </div>
  <div class="right">
    <h2>步驟 2：貼入逐句文本</h2>
    <div class="url-box" style="flex-direction:column">
      <textarea id="textArea" rows="4" style="width:100%;padding:8px;border:1px solid #ccc;border-radius:6px;font-size:12px" placeholder="格式：每一行一句&#10;德文句子 ||| 中文翻譯&#10;例如：Heute ist es warm. ||| 今天天氣溫暖。"></textarea>
      <button onclick="parseText()">生成跟讀列表</button>
    </div>
    <h2 style="margin-top:16px;">逐句跟讀</h2>
    <div class="progress" id="prog">完成：0 / 0</div>
    <div id="list"></div>
  </div>
</div>
<script>
let VID='5xMl8W-aiCg';
let sentences=[];
let done=[];

function getVideoId(url){
  try{
    var u=new URL(url.trim());
    if(u.hostname.includes('youtu.be')) return u.pathname.replace('/','').split('?')[0];
    if(u.hostname.includes('youtube.com')) return u.searchParams.get('v');
  }catch(e){}
  return null;
}

function loadVideo(){
  var input=document.getElementById('ytInput').value.trim();
  var id=getVideoId(input);
  if(!id){ alert('無法識別這個 YouTube 連結，請檢查格式。'); return; }
  VID=id;
  document.getElementById('yt').src='https://www.youtube.com/embed/'+id;
  document.getElementById('textArea').placeholder='影片：'+id+' 已載入\n請貼上逐句文本（德文 ||| 中文）';
}

function parseText(){
  var raw=document.getElementById('textArea').value.split('\n').map(function(l){return l.trim()}).filter(function(l){return l.length>0});
  sentences=raw.map(function(line,i){
    var parts=line.split('|||');
    return {
      ts: Math.floor(i*5),
      de: parts[0].trim(),
      zh: parts[1] ? parts[1].trim() : ''
    };
  });
  done=new Array(sentences.length).fill(false);
  render();
}

function fmt(s){
  var m=Math.floor(s/60), sec=s%60;
  return m+':'+(sec<10?'0':'')+sec;
}

function jump(ts){
  document.getElementById('yt').src='https://www.youtube.com/embed/'+VID+'?autoplay=1&start='+ts;
}

function toggle(i){
  done[i]=!done[i];
  render();
}

function render(){
  var list=document.getElementById('list');
  list.innerHTML='';
  var dc=done.filter(Boolean).length;
  document.getElementById('prog').textContent='完成：'+dc+' / '+sentences.length;
  sentences.forEach(function(s,i){
    var card=document.createElement('div');
    card.className='card'+(done[i]?' done':'');

    var tsSpan=document.createElement('span');
    tsSpan.className='ts';
    tsSpan.textContent=fmt(s.ts)+' ▶ 跳到此句';
    tsSpan.onclick=function(){jump(s.ts);};

    var deSpan=document.createElement('div');
    deSpan.className='de';
    deSpan.textContent=s.de;

    if(s.zh){
      var zhSpan=document.createElement('div');
      zhSpan.className='zh';
      zhSpan.textContent=s.zh;
      card.appendChild(zhSpan);
    }

    var btns=document.createElement('div');
    btns.className='btns';
    var btn=document.createElement('button');
    btn.className='btns-btn '+(done[i]?'b-undo':'b-done');
    btn.textContent=done[i]?'取消':'已跟讀 ✓';
    btn.onclick=function(){toggle(i);};
    btns.appendChild(btn);

    card.appendChild(tsSpan);
    card.appendChild(deSpan);
    card.appendChild(btns);
    list.appendChild(card);
  });
}
</script>
</body>
</html>
