<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>德文跟讀練習 - 3 Minute German Course 2</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#f0f4f8;color:#222}
header{background:#1565c0;color:#fff;padding:14px 18px;position:sticky;top:0;z-index:100}
header h1{font-size:18px}
header p{font-size:12px;margin-top:4px;opacity:.85}
.wrap{display:flex;flex-direction:row;height:calc(100vh - 60px)}
@media(max-width:800px){.wrap{flex-direction:column;height:auto}}
.left{width:40%;border-right:1px solid #ccc;overflow-y:auto;padding:12px;background:#fff}
.right{width:60%;overflow-y:auto;padding:12px;background:#fafafa}
@media(max-width:800px){.left,.right{width:100%}}
h2{font-size:14px;margin-bottom:8px;color:#1565c0}
.card{border:1px solid #e0e0e0;border-radius:6px;padding:10px;margin-bottom:8px;background:#fff;transition:background .2s}
.card.done{background:#e8f5e9;border-color:#a5d6a7}
.card.done .de{text-decoration:line-through;color:#999}
.ts{font-size:11px;color:#1565c0;cursor:pointer;text-decoration:underline;margin-bottom:4px;display:inline-block}
.de{font-size:14px;margin:4px 0;line-height:1.5}
.btns{margin-top:6px}
button{font-size:11px;padding:4px 10px;border:none;border-radius:4px;cursor:pointer}
.b-done{background:#43a047;color:#fff}
.b-undo{background:#ef6c00;color:#fff}
.progress{font-size:12px;color:#555;margin-bottom:8px;padding:8px;background:#e3f2fd;border-radius:6px}
</style>
</head>
<body>
<header>
  <h1>德文跟讀練習 - 3 Minute German Course 2</h1>
  <p>左邊看影片，右邊逐句跟讀。點時間戳記可跳到對應片段。</p>
</header>
<div class="wrap">
  <div class="left">
    <h2>影片</h2>
    <iframe id="yt" width="100%" height="220" src="https://www.youtube.com/embed/5xMl8W-aiCg" frameborder="0" allowfullscreen></iframe>
    <p style="font-size:11px;color:#888;margin-top:8px;">點右側「跳到此句」即可跳到影片對應時間點。</p>
  </div>
  <div class="right">
    <h2>逐句跟讀</h2>
    <div class="progress" id="prog">完成：0 / 0</div>
    <div id="list"></div>
  </div>
</div>
<script>
const VID='5xMl8W-aiCg';
const S=[
  {ts:1,  t:'3 Minute German - Course 2'},
  {ts:5,  t:'Hello and welcome! This is Course 2 in the 3 Minute German series, covering lessons 10 to 18.'},
  {ts:12, t:'If you know all the words from Course 1, you are ready to jump straight in.'},
  {ts:19, t:'The good thing is that everything you learn is recapped in later lessons, so you do not need to go back to refresh your memory.'},
  {ts:24, t:'Although you can go back if you want — it will not harm you!'},
  {ts:30, t:'At the end of every lesson are recap practice exercises.'},
  {ts:36, t:'These make sure the words and phrases from previous lessons are still secure in your memory.'},
  {ts:43, t:'In this course you will start to look at some different sentence structures in German.'},
  {ts:50, t:'You will learn ways to ask questions, and get an introduction to verbs.'},
  {ts:55, t:'All of this will open up the German language to you, giving you many more things to say.'},
  {ts:62, t:'Do not worry if you have never come across verbs before or had a bad experience with grammar.'},
  {ts:67, t:'Everything is explained in a simple and easy-to-understand way.'},
  {ts:74, t:'New topics include telling the time in German, booking taxis, and asking where things are.'},
  {ts:81, t:'We will also look at the Saxon genitive — an interesting linguistic feature in English.'},
  {ts:89, t:'It is a bit different in German, so we will need to learn how to use it.'},
  {ts:93, t:'The best way to tackle tricky features is to spread them out, not introduce them all at once.'},
  {ts:99, t:'Introducing all linguistic features on the first page of a textbook can be very off-putting.'},
  {ts:110, t:'In 3-Minute German, the trickier features are broken down and spread throughout the course.'},
  {ts:115, t:'We look at each feature when it crops up naturally in the order of the course.'},
  {ts:122, t:'Some features need explaining so you can understand how German structures work.'},
  {ts:128, t:'There are also vocabulary expansion sheets to boost your German vocabulary.'},
  {ts:134, t:'I hope you enjoy the course!'}
];

let done = new Array(S.length).fill(false);

function fmt(s){
  const m = Math.floor(s/60), sec = s%60;
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

function jump(ts){
  document.getElementById('yt').src = 'https://www.youtube.com/embed/' + VID + '?autoplay=1&start=' + ts;
}

function toggle(i){
  done[i] = !done[i];
  render();
}

function render(){
  const list = document.getElementById('list');
  list.innerHTML = '';
  const dc = done.filter(Boolean).length;
  document.getElementById('prog').textContent = '完成：' + dc + ' / ' + S.length;
  S.forEach(function(s, i){
    const card = document.createElement('div');
    card.className = 'card' + (done[i] ? ' done' : '');

    const tsSpan = document.createElement('span');
    tsSpan.className = 'ts';
    tsSpan.textContent = fmt(s.ts) + ' ▶ 跳到此句';
    tsSpan.onclick = function(){ jump(s.ts); };

    const deSpan = document.createElement('div');
    deSpan.className = 'de';
    deSpan.textContent = s.t;

    const btns = document.createElement('div');
    btns.className = 'btns';
    const btn = document.createElement('button');
    btn.className = done[i] ? 'b-undo' : 'b-done';
    btn.textContent = done[i] ? '取消' : '已跟讀 ✓';
    btn.onclick = function(){ toggle(i); };
    btns.appendChild(btn);

    card.appendChild(tsSpan);
    card.appendChild(deSpan);
    card.appendChild(btns);
    list.appendChild(card);
  });
}

render();
</script>
</body>
</html>
